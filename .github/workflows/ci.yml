name: CI

on:
  push:
  pull_request:

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install pinned clang-format
        run: pipx install clang-format==19.1.5
      - name: clang-format version
        run: clang-format --version
      - name: clang-format check
        run: |
          find core app ui tests \( -name '*.cpp' -o -name '*.h' \) -print0 \
            | xargs -0 clang-format --dry-run --Werror

  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
      - name: Configure (core + tests, no Qt UI)
        run: >
          cmake --preset windows-release
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
          -DTROPOLINK_BUILD_UI=OFF
      - name: Build
        run: cmake --build --preset windows-release
      - name: Test
        run: ctest --preset windows-release --output-on-failure
